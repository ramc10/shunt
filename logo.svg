<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 50" width="200" height="100">
  <!--
    Logo mapped from terminal output (each █ = 10px cell):
      ..██████..    row 0: cols 2-7
      ███....███    row 1: cols 0-2, cols 7-9
      ..██████..    row 2: cols 2-7
      ...█..█...    row 3: col 3, col 6
  -->
  <!-- top bar -->
  <rect x="20" y="0"  width="60" height="10" fill="#e8e8e8"/>
  <!-- left side -->
  <rect x="0"  y="10" width="30" height="10" fill="#e8e8e8"/>
  <!-- right side -->
  <rect x="70" y="10" width="30" height="10" fill="#e8e8e8"/>
  <!-- bottom bar -->
  <rect x="20" y="20" width="60" height="10" fill="#e8e8e8"/>
  <!-- left leg -->
  <rect x="30" y="30" width="10" height="10" fill="#e8e8e8"/>
  <!-- right leg -->
  <rect x="60" y="30" width="10" height="10" fill="#e8e8e8"/>
</svg>
